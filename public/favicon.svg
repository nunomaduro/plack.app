<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <!-- plack favicon: terminal wordmark mark — amber "p" + phosphor-green block cursor -->
    <rect width="32" height="32" rx="7" fill="#0c0a06" />
    <!-- lowercase "p" (amber #e5a23d) -->
    <rect x="7" y="8" width="3.6" height="17" rx="1.8" fill="#e5a23d" />
    <circle cx="13" cy="14.5" r="6" fill="#e5a23d" />
    <circle cx="13.8" cy="14.5" r="2.9" fill="#0c0a06" />
    <!-- block cursor (phosphor green #7fae5f) -->
    <rect x="21.4" y="9" width="4.2" height="11" rx="0.6" fill="#7fae5f" />
</svg>
